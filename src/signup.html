<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./output.css" />
    <title>Document</title>
  </head>
  <body class="font-poppins">
    <div
      class="max-w-6xl mx-auto flex flex-col justify-center items-center h-lvh my-25 px-4 lg:px-0"
    >
      <div class="w-full lg:w-109.25">
        <img src="/assets/img/logo.png" class="w-15 h-15" alt="" />
        <h1 class="mt-15 text-[32px] text-navy font-bold">Sign Up</h1>
        <p class="mt-6 text-base text-navy">Daftar dan bergabung dengan kami</p>
        <div class="flex flex-col my-12.5 gap-8">
          <div class="flex flex-col gap-3">
            <label for="#" class="text-base text-navy font-normal"
              >Full Name</label
            >
            <input
              type="text"
              class="border border-navy py-3 px-5 rounded-full"
              placeholder="Writen your name"
            />
          </div>
          <div class="flex flex-col gap-3">
            <label for="#" class="text-base text-navy font-normal"
              >Email Address</label
            >
            <input
              type="email"
              class="border border-navy py-3 px-5 rounded-full"
              placeholder="Enter your email address"
            />
          </div>
          <div class="flex flex-col gap-3">
            <label for="#" class="text-base text-navy font-normal"
              >Password</label
            >
            <input
              type="password"
              class="border border-navy py-3 px-5 rounded-full"
              placeholder="Your password"
            />
          </div>
        </div>
        <div class="flex flex-col gap-4">
          <a
            href="#"
            class="bg-purple w-full text-center py-3 text-base text-white rounded-full"
            >Continue</a
          >
          <a
            href="#"
            class="bg-abu w-full text-center py-3 text-base text-navy rounded-full"
            >Sign In</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
